<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Прайс на надувание шаров</title>

        <meta
            name="description"
            content="Стоимость надувания воздушных шаров гелием"
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎈</text></svg>"
        />

        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <!-- LOADER (Shopify skeleton) -->
        <div id="loader" class="loader">
            <div class="loader-card">
                <div class="sk-title"></div>
                <div class="sk-price"></div>
            </div>

            <div class="loader-card">
                <div class="sk-title"></div>
                <div class="sk-price"></div>
            </div>

            <div class="loader-card">
                <div class="sk-title"></div>
                <div class="sk-price"></div>
            </div>

            <div class="loader-card">
                <div class="sk-title"></div>
                <div class="sk-price"></div>
            </div>
        </div>

        <div class="container">
            <header>
                <div class="logo">🎈</div>
                <h1>Надувание шаров</h1>
                <p class="subtitle">Актуальный прайс на услуги</p>
            </header>

            <section class="switch">
                <button class="tab active" data-sheet="ourBalls">
                    Наши шары
                </button>
                <button class="tab" data-sheet="guestBalls">
                    Шары клиентов
                </button>
            </section>

            <section class="search">
                <input
                    id="searchInput"
                    type="text"
                    placeholder="Поиск по названию шара"
                />
            </section>

            <div id="warningBanner" class="warning hidden"></div>

            <main id="catalog" class="catalog"></main>

            <div id="empty" class="empty hidden">
                <div class="empty-icon">🎈</div>
                <p>Ничего не найдено</p>
            </div>

            <footer>
                <p>Цены обновляются автоматически</p>
            </footer>
        </div>

        <template id="cardTemplate">
            <article class="card">
                <h2 class="ball-name"></h2>

                <div class="price">
                    <span class="value"></span>
                    <span class="currency">BYN</span>
                </div>
            </article>
        </template>

        <script src="script.js"></script>
    </body>
</html>
